name: mfiles_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.3+12

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.4.0
  file_picker: ^11.0.2
  provider: ^6.1.5
  json_annotation: ^4.9.0
  open_filex: ^4.7.0
  intl: ^0.20.2                     # Downgraded for compatibility
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  connectivity_plus: ^7.1.1 
  url_launcher: ^6.3.0

   # DSS dependencies
  flutter_secure_storage: ^10.2.0
  http_parser: ^4.0.2
  
  # Document Preview Dependencies
  flutter_pdfview: ^1.3.2          # PDF preview
  photo_view: ^0.15.0              # Image zoom/pan
  syncfusion_flutter_pdfviewer: ^33.2.4  # Alternative PDF viewer with better controls
  webview_flutter: ^4.10.0         # For HTML/text files
  flutter_widget_from_html: ^0.17.2  # HTML rendering

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/alignsyslogo.png
    - assets/TechEdgeLogo.png
    - assets/alignsysop.png 
    - assets/alignsysnew.png
    - assets/alignsysapplogo.png
    # You can add more assets or use a folder:
    # - assets/

flutter_launcher_icons:
    android: true
    ios: true
    image_path: "assets/alignsysapplogo.png"